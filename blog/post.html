<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài viết | SHINTRADING Academy</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .blog-content { max-width: 800px; margin: 10rem auto; padding: 0 2rem; min-height: 100vh; }
        #post-title { font-size: 3.5rem; margin-bottom: 2rem; }
        #post-image { width: 100%; border-radius: 24px; margin: 2rem 0; object-fit: cover; max-height: 500px; }
        .blog-body { color: var(--text-muted); font-size: 1.1rem; line-height: 1.8; }
        .blog-body h2 { color: var(--text-main); margin: 3rem 0 1rem; }
        #loading { text-align: center; color: var(--primary-color); font-size: 1.5rem; }
    </style>
</head>
<body>
    <nav id="navbar" class="scrolled">
        <div class="container nav-content">
            <a href="../index.html" class="logo"><span style="color: var(--primary-color)">SHIN</span>TRADING</a>
            <a href="../index.html" class="btn btn-outline">Quay lại</a>
        </div>
    </nav>

    <article class="blog-content" id="blog-article" style="display: none;">
        <span id="post-category" style="color: var(--secondary-color); font-weight: 600; text-transform: uppercase;"></span>
        <h1 id="post-title" class="gradient-text"></h1>
        <p id="post-date" style="color: var(--text-muted)"></p>
        
        <img id="post-image" src="" alt="">

        <div id="post-content" class="blog-body"></div>

        <div class="glass-card" style="margin-top: 4rem; border-color: var(--primary-color);">
            <h3>Tham gia cộng đồng ngay</h3>
            <p>Nhận các thông báo real-time và các lệnh call chất lượng cao mỗi ngày.</p>
            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <a href="#" class="btn btn-primary">Telegram</a>
                <a href="#" class="btn btn-outline">Zalo</a>
            </div>
        </div>
    </article>

    <div id="loading" style="margin: 20rem 0;">Đang tải nội dung...</div>

    <footer style="padding: 4rem 0; border-top: 1px solid var(--surface-border); text-align: center;">
        <p style="color: var(--text-muted);">© 2026 SHINTRADING Academy</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('id');
            
            if (!postId) {
                window.location.href = '../index.html';
                return;
            }

            try {
                const response = await fetch('../data/posts.json');
                const posts = await response.json();
                const post = posts.find(p => p.id === postId);

                if (post) {
                    document.title = `${post.title} | SHINTRADING Academy`;
                    document.getElementById('post-category').textContent = post.category;
                    document.getElementById('post-title').textContent = post.title;
                    document.getElementById('post-date').textContent = `Ngày đăng: ${post.date} | Tác giả: Admin SHINTRADING`;
                    document.getElementById('post-image').src = post.image;
                    document.getElementById('post-image').alt = post.title;
                    document.getElementById('post-content').innerHTML = post.content;
                    
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('blog-article').style.display = 'block';
                } else {
                    document.getElementById('loading').textContent = 'Không tìm thấy bài viết này.';
                }
            } catch (error) {
                console.error('Error loading post:', error);
                document.getElementById('loading').textContent = 'Đã xảy ra lỗi khi tải dữ liệu.';
            }
        });
    </script>
</body>
</html>
